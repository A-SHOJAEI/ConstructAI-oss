name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --no-cache-dir ruff==0.15.12

      - name: ruff format --check
        working-directory: apps/api
        run: ruff format --check .

      - name: ruff check
        working-directory: apps/api
        run: ruff check .
