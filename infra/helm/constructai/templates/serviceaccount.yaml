{{- /*
H-23: Dedicated ServiceAccount + Role for the API and web workloads.
Previously these pods inherited the namespace default SA which grants more
Kubernetes API access than we need. This template pins least-privilege:
- API SA can read its own Secrets and ConfigMaps (used by in-cluster
  config reloaders) — nothing else.
- Web SA has zero cluster access (pure egress workload).

Disable by setting `rbac.create: false` in values.yaml if the cluster uses
an external admission controller that manages RBAC.
*/}}
{{- $name := include "constructai.fullname" . }}
{{- $rbac := .Values.rbac | default dict }}
{{- if hasKey $rbac "create" | ternary $rbac.create true }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-api
  labels:
    app.kubernetes.io/name: {{ include "constructai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-web
  labels:
    app.kubernetes.io/name: {{ include "constructai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-api
  labels:
    app.kubernetes.io/name: {{ include "constructai.name" . }}
    app.kubernetes.io/component: api
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "watch", "list"]
    resourceNames:
      - {{ $name }}-api
      - {{ $name }}-api-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-api
  labels:
    app.kubernetes.io/name: {{ include "constructai.name" . }}
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-api
subjects:
  - kind: ServiceAccount
    name: {{ $name }}-api
    namespace: {{ .Release.Namespace }}
{{- end }}
