apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-web
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount.web }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-web
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-web
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- /* H-23: use the dedicated SA (no permissions needed for web) */}}
      serviceAccountName: {{ include "constructai.fullname" . }}-web
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ required "image.web.tag is required" .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            # NOTE: NEXT_PUBLIC_* vars are inlined at build time in Next.js.
            # Override via Docker build args in the CI/CD pipeline.
            # This runtime value serves as documentation only.
            - name: NEXT_PUBLIC_API_URL
              value: "https://{{ (index .Values.ingress.hosts 0).host }}"
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
