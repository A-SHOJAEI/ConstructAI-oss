apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: constructai-api
  namespace: constructai
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: constructai
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/part-of: constructai
  strategy:
    canary:
      canaryService: constructai-api-canary
      stableService: constructai-api
      trafficRouting:
        nginx:
          stableIngress: constructai-ingress
          additionalIngressAnnotations:
            canary-by-header: X-Canary
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - analysis:
            templates:
              - templateName: api-success-rate
            args:
              - name: service-name
                value: constructai-api-canary
        - setWeight: 25
        - pause: { duration: 3m }
        - analysis:
            templates:
              - templateName: api-success-rate
            args:
              - name: service-name
                value: constructai-api-canary
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 75
        - pause: { duration: 2m }
        - setWeight: 100
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: constructai
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: constructai-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          # CI MUST substitute this value. Deployment will fail if IMAGE_TAG is not replaced.
          image: ghcr.io/constructai/constructai/api:IMAGE_TAG
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: constructai-config
            - secretRef:
                name: constructai-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: constructai-api-canary
  namespace: constructai
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: constructai
    app.kubernetes.io/component: canary
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: constructai
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-success-rate
  namespace: constructai
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      count: 5
      successCondition: result[0] >= 0.95
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(rate(
              http_requests_total{service="{{args.service-name}}", status=~"2.."}[2m]
            )) /
            sum(rate(
              http_requests_total{service="{{args.service-name}}"}[2m]
            ))
    - name: latency-p95
      interval: 30s
      count: 5
      successCondition: result[0] <= 500
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(
                http_request_duration_seconds_bucket{service="{{args.service-name}}"}[2m]
              )) by (le)
            ) * 1000
