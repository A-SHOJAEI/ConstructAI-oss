apiVersion: v1
kind: ConfigMap
metadata:
  name: constructai-config
  namespace: constructai
  labels:
    app.kubernetes.io/part-of: constructai
data:
  # ---------- General ----------
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"

  # ---------- API ----------
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  CORS_ORIGINS: "https://app.your-deployment.example.com"
  ALLOWED_HOSTS: "app.your-deployment.example.com,api.your-deployment.example.com"

  # ---------- Database ----------
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "constructai"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"

  # ---------- Redis ----------
  # SECURITY [M-24]: Use TLS port — must match production Redis TLS configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6380"

  # ---------- Kafka ----------
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  # ---------- MQTT ----------
  # SECURITY [M-24]: Use TLS port — must match production MQTT TLS configuration
  MQTT_BROKER_HOST: "mosquitto"
  MQTT_BROKER_PORT: "8883"

  # ---------- Observability ----------
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "constructai-api"
  PROMETHEUS_ENABLED: "true"

  # ---------- Web / Next.js ----------
  NEXT_PUBLIC_API_URL: "https://api.your-deployment.example.com"
  NEXT_PUBLIC_WS_URL: "wss://api.your-deployment.example.com/ws"
  NEXTAUTH_URL: "https://app.your-deployment.example.com"

  # ---------- Auth ----------
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
