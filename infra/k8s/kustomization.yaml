apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: constructai

commonLabels:
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - api-hpa.yaml
  - web-deployment.yaml
  - web-service.yaml
  - ingress.yaml
  - network-policy.yaml
  - argo-rollout.yaml

# NOTE: newTag defaults are placeholders; CI must override with actual image tags
# e.g. kustomize edit set image ghcr.io/constructai/constructai/api:sha-abc1234
images:
  - name: ghcr.io/constructai/constructai/api
    newTag: 0.0.0-dev
  - name: ghcr.io/constructai/constructai/web
    newTag: 0.0.0-dev
