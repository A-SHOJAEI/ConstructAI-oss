apiVersion: v1
kind: Service
metadata:
  name: constructai-web
  namespace: constructai
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: constructai
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: constructai
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
