global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"
  - "alert_rules_constructai.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # M-49: credentials_file is mounted from a K8s/Docker secret (see
  # README.md); rotation is handled by cycling the secret (the scraper
  # re-reads the file every reload without restart). Do not commit the
  # token itself — CI renders this config as-is and mounts the secret
  # file at the expected path.
  - job_name: "constructai-api"
    metrics_path: "/metrics"
    authorization:
      credentials_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ["api:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
