# nginx reverse proxy for the ConstructAI demo front-end.
#
# Responsibilities:
#   1. Generate a per-request CSP nonce (16 hex bytes from $request_id).
#   2. Inject `nonce="$cspNonce"` onto every <script> tag in HTML
#      responses via http_sub_module (sub_filter). Next.js 15 standalone
#      doesn't do this reliably itself; doing it here makes CSP enforceable.
#   3. Emit a matching Content-Security-Policy header on the same response.
#   4. Strip any upstream CSP (proxy_hide_header) so the upstream's
#      attempt at CSP doesn't fight ours.
#
# What this DOESN'T do:
#   - Front the API. The browser still talks directly to api:8000 because
#     that container's CSP is for JSON/SSE responses (not relevant for
#     script execution) and adding sub_filter to large JSON responses
#     is wasted work. CSP for the API is the API's responsibility.
#   - HTTPS. The demo is on localhost; add a TLS terminator in front for
#     internet-facing deployments.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Standard logging.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" nonce=$cspNonce';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Re-compress responses on the way out, since we stripped
    # Accept-Encoding from the upstream request to make sub_filter work.
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json text/html;
    gzip_min_length 1024;

    # Map the per-request ID into a CSP-safe nonce. nginx's $request_id
    # is 16 random bytes hex-encoded (32 chars) — already URL-safe ASCII,
    # acceptable as a CSP nonce per the spec.
    map $request_id $cspNonce {
        default $request_id;
    }

    # Allow proxy_pass to receive WS upgrades for any future HMR/WebSocket
    # endpoints the dashboard might use.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream constructai_web {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # Cheap proxy-side health check. Doesn't hit the upstream.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # Default route: everything else proxies to the Next.js web container.
        location / {
            proxy_pass http://constructai_web;
            proxy_http_version 1.1;

            # Required headers for proper proxying.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Hand the upstream the same nonce so its server-rendered
            # output (e.g. <Script nonce={...}>) can match what we
            # inject + emit in CSP.
            proxy_set_header X-Nonce $cspNonce;

            # CRITICAL: strip Accept-Encoding so the upstream returns
            # uncompressed bytes. sub_filter operates on plaintext only —
            # if the upstream gzips its response (which Next.js does for
            # browsers that send Accept-Encoding: gzip), sub_filter sees
            # opaque binary and the nonce injection silently no-ops.
            # We let nginx re-compress on the way out via gzip on; below.
            proxy_set_header Accept-Encoding "";

            # Strip the upstream's attempt at setting CSP — we own it here
            # to keep the nonce a single source of truth.
            proxy_hide_header Content-Security-Policy;

            # Inject `nonce="$cspNonce"` onto every <script> tag in the
            # response body. Next.js's standalone bundle outputs both
            # `<script src=...>` (chunks) and `<script>...</script>`
            # (hydration data) tags, and we hit both with this filter.
            #
            # The pattern matches `<script` followed by either ` ` or `>`
            # so we don't accidentally match `<scripts` or similar
            # variants. Order matters: more specific pattern first.
            sub_filter '<script src='        '<script nonce="$cspNonce" src=';
            sub_filter '<script async '      '<script nonce="$cspNonce" async ';
            sub_filter '<script>'            '<script nonce="$cspNonce">';
            # Also stamp <link rel="preload" as="script"> so preloaded
            # scripts pass the CSP nonce check when the matching <script>
            # tag later evaluates them. Without this, Chromium treats
            # the preload-without-nonce as a violation in the console
            # even though the actual <script> evaluation is fine.
            sub_filter '<link rel="preload" as="script"' '<link rel="preload" as="script" nonce="$cspNonce"';
            sub_filter_once off;
            sub_filter_types text/html;

            # Emit the matching CSP.
            #   - script-src: nonce + 'strict-dynamic'. With strict-dynamic,
            #     any script loaded transitively by a nonce'd script is
            #     also trusted — needed because Next.js dynamically
            #     injects chunk scripts via document.createElement at
            #     runtime, and those don't carry the nonce attribute.
            #     'self' is technically ignored when strict-dynamic is
            #     present, but listed for legacy-browser fallback.
            #   - connect-src: 'self' for same-origin fetches, plus the
            #     api host (http://localhost:8000) so the browser can
            #     reach the API. For non-localhost deployments override
            #     when launching nginx.
            #   - style-src: 'unsafe-inline' kept because Radix UI portals
            #     inject inline styles without nonces. CSS injection is
            #     a different threat model than JS.
            #   - frame-ancestors 'none': no clickjacking.
            #
            # always = also emit on 4xx/5xx responses, so the protection
            # applies to error pages too.
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$cspNonce' 'strict-dynamic'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: http://localhost:8000; font-src 'self'; frame-ancestors 'none'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;

            # Buffering must stay ON for sub_filter to see the full
            # response body — without buffering, sub_filter only matches
            # within a single chunk and can miss `<script` tags split
            # across chunk boundaries. The downside is that streamed
            # RSC responses are buffered briefly; for a demo this is
            # imperceptible.
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 16 16k;
            proxy_busy_buffers_size 32k;
        }
    }
}
