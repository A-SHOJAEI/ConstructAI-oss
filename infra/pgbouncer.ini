[databases]
constructai = host=postgres port=5432 dbname=constructai

[pgbouncer]
# Bind to all interfaces for container networking (isolation via Docker/K8s network policies)
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3
server_lifetime = 3600
server_idle_timeout = 600
log_connections = 1
log_disconnections = 1
stats_period = 60
# SECURITY [L-14]: Restrict admin console and stats access to a specific user
# to prevent unauthorized access to PgBouncer management commands.
admin_users = pgbouncer_admin
stats_users = pgbouncer_admin, pgbouncer_stats
